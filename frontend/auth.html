<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Meeting Agenda Generator – Login</title>
    <link rel="stylesheet" href="css/main.css" />
    <link rel="stylesheet" href="css/auth.css" />
  </head>
  <body>
    <main class="auth-container">
      <h1>Meeting Agenda Generator</h1>
      <div class="auth-tabs">
        <button id="tab-login" class="tab active">Log In</button>
        <button id="tab-register" class="tab">Register</button>
      </div>

      <form id="login-form">
        <label for="login-email">Email</label>
        <input type="email" id="login-email" required />
        <label for="login-password">Password</label>
        <div class="password-wrapper">
          <input type="password" id="login-password" required />
          <button
            type="button"
            class="toggle-password"
            data-target="login-password"
          >
            Show
          </button>
        </div>
        <button type="submit" class="btn btn-primary">Log In</button>
        <p id="login-error" class="error hidden"></p>
      </form>

      <form id="register-form" class="hidden">
        <label for="reg-email">Email</label>
        <input type="email" id="reg-email" required />
        <label for="reg-password">Password</label>
        <div class="password-wrapper">
          <input type="password" id="reg-password" required />
          <button
            type="button"
            class="toggle-password"
            data-target="reg-password"
          >
            Show
          </button>
        </div>
        <button type="submit" class="btn btn-primary">Create Account</button>
        <p id="reg-error" class="error hidden"></p>
      </form>
    </main>
    <script type="module" src="js/auth.js"></script>
  </body>
</html>
