<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agenda Agent – Dashboard</title>
    <link rel="stylesheet" href="css/main.css" />
    <link rel="stylesheet" href="css/dashboard.css" />
  </head>
  <body>
    <nav class="navbar">
      <div style="display: flex; align-items: center; gap: 0.6rem">
        <img src="images/logo.svg" alt="logo" width="32" />
        <span class="nav-brand">Agenda Agent</span>
      </div>
      <div class="nav-links">
        <a href="employees.html">Employees</a>
        <button id="logout-btn" class="btn btn-primary">Log Out</button>
      </div>
    </nav>

    <main class="dashboard-container">
      <div class="dashboard-layout">
        <div class="dashboard-sidebar">
          <img
            src="images/logo.svg"
            alt="Meeting Agenda Generator"
            width="160"
          />
          <h2>Meeting Agenda<br />Generator</h2>
          <p class="hint">Create structured agendas for your team meetings.</p>
          <a href="meetings.html" class="btn btn-primary">+ New Meeting</a>
        </div>
        <div class="dashboard-main">
          <h2>Previous Meetings</h2>
          <ul id="meetings-list" class="meetings-list">
            <li class="placeholder">No meetings yet.</li>
          </ul>
        </div>
      </div>
    </main>
    <script type="module" src="js/main.js"></script>
    <script type="module" src="js/dashboard.js"></script>
  </body>
</html>
